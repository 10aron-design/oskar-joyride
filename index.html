<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Óskar: Fart Joyride</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0d0d1a;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  #wrap { position: relative; }
  #gc { display: block; cursor: pointer; }
  #wrap:fullscreen, #wrap:-webkit-full-screen {
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #000;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="gc"></canvas>
</div>

<script>
const cv = document.getElementById('gc');
const cx = cv.getContext('2d');
const wrap = document.getElementById('wrap');

const CW = 680, CH = 400;
const CEIL = 20, FLOOR = CH - 30;
const PX = 110;
const GRAV = 0.22;
const THRUST = -0.55;
const MAXV = 7;

let state, p, obs, particles, coins, score, ducks, speed, frame, spawnT, thrusting;
let hiDist = 0, hiDucks = 0;

// Size canvas to window on load and resize
function resizeCanvas() {
  const fs = document.fullscreenElement || document.webkitFullscreenElement;
  if (fs) {
    const scaleX = window.innerWidth / CW;
    const scaleY = window.innerHeight / CH;
    const scale = Math.min(scaleX, scaleY);
    cv.style.width  = Math.round(CW * scale) + 'px';
    cv.style.height = Math.round(CH * scale) + 'px';
  } else {
    const maxW = Math.min(window.innerWidth - 16, CW);
    const scale = maxW / CW;
    cv.style.width  = Math.round(CW * scale) + 'px';
    cv.style.height = Math.round(CH * scale) + 'px';
  }
}
cv.width  = CW;
cv.height = CH;
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

try {
  hiDist  = parseInt(localStorage.getItem('oskar_hiDist')  || '0');
  hiDucks = parseInt(localStorage.getItem('oskar_hiDucks') || '0');
} catch(e) {}

function saveHi() {
  const dist = Math.floor(score / 5);
  if (dist  > hiDist)  hiDist  = dist;
  if (ducks > hiDucks) hiDucks = ducks;
  try {
    localStorage.setItem('oskar_hiDist',  hiDist);
    localStorage.setItem('oskar_hiDucks', hiDucks);
  } catch(e) {}
}

function init() {
  state = 'idle';
  p = { x: PX, y: FLOOR - 56, vy: 0, w: 30, h: 56, dead: false, grounded: true };
  obs = []; coins = []; particles = [];
  score = 0; ducks = 0; speed = 4; frame = 0; spawnT = 60; thrusting = false;
}

function spawn() {
  const r = Math.random();
  if (r < 0.30) {
    obs.push({ t:'soap', x:CW+30, y:CEIL+30+Math.random()*(FLOOR-CEIL-100), w:44, h:32 });
  } else if (r < 0.50) {
    if (Math.random() < 0.5) obs.push({ t:'soap_col', x:CW+30, y:CEIL, w:32, h:80+Math.random()*100 });
    else { const h=80+Math.random()*100; obs.push({ t:'soap_col', x:CW+30, y:FLOOR-h, w:32, h }); }
  } else if (r < 0.78) {
    const upper = Math.random() < 0.5;
    obs.push({ t:'shower', x:CW+30, y:upper?CEIL:(CEIL+FLOOR)/2, w:70, h:(FLOOR-CEIL)/2, upper });
  } else {
    const y = CEIL+40+Math.random()*(FLOOR-CEIL-140);
    [0,30,60].forEach((ox,i) => coins.push({ x:CW+30+ox, y:y+i*4, w:22, h:22, taken:false }));
  }
}

function overlap(a, b) {
  const pad = 4;
  return a.x+pad < b.x+b.w-pad && a.x+a.w-pad > b.x+pad &&
         a.y+pad < b.y+b.h-pad && a.y+a.h-pad > b.y+pad;
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function drawBg() {
  cx.fillStyle='#1a1a2e'; cx.fillRect(0,0,CW,CH);
  cx.fillStyle='#2a2a4e';
  for (let i=0;i<8;i++) {
    const tx=((frame*0.5+i*95)%(CW+80))-40;
    cx.fillRect(tx,CEIL,60,14); cx.fillRect(tx,FLOOR-14,60,14);
  }
  cx.fillStyle='#444'; cx.fillRect(0,0,CW,CEIL);
  cx.fillStyle='#555'; cx.fillRect(0,FLOOR,CW,CH-FLOOR);
  cx.fillStyle='#666'; cx.fillRect(0,CEIL-2,CW,2);
  cx.fillStyle='#777'; cx.fillRect(0,FLOOR,CW,2);
  cx.fillStyle='#3a3a5e';
  for (let i=0;i<6;i++) { const tx=((frame*0.2+i*160)%(CW+100))-50; cx.fillRect(tx,CH/2-50,40,100); }
  cx.fillStyle='#333';
  for (let i=0;i<12;i++) { const tx=((frame*speed)%40+i*60)-40; cx.fillRect(tx,FLOOR+6,20,3); }
}

function drawOskar() {
  const x=p.x, y=p.y;
  if (p.dead) cx.globalAlpha=0.55;
  const run = p.grounded && state==='running';
  const legOff = run ? Math.sin(frame*0.4)*5 : 0;
  const armOff = run ? Math.cos(frame*0.4)*4 : 0;
  cx.fillStyle='#3a6db5'; cx.fillRect(x+4,y+38,9,14); cx.fillRect(x+17,y+38,9,14);
  cx.fillStyle='#c8a27a'; cx.fillRect(x+3,y+50+legOff,11,6); cx.fillRect(x+16,y+50-legOff,11,6);
  cx.fillStyle='#e8e8e8'; cx.fillRect(x+2,y+20,26,22);
  cx.fillStyle='#ccc'; cx.fillRect(x+2,y+20,26,3);
  const hx=x+1, hy=y;
  cx.fillStyle='#f5c5a3'; cx.beginPath(); cx.roundRect(hx,hy,28,24,6); cx.fill();
  cx.fillStyle='#d4a882';
  cx.beginPath(); cx.ellipse(hx+7,hy+18,5,4,0,0,Math.PI*2); cx.ellipse(hx+21,hy+18,5,4,0,0,Math.PI*2); cx.fill();
  cx.fillStyle='#8B6040'; cx.beginPath(); cx.roundRect(hx+1,hy+1,26,9,[5,5,0,0]); cx.fill();
  cx.fillStyle='#fff'; cx.fillRect(hx+5,hy+10,7,7); cx.fillRect(hx+16,hy+10,7,7);
  cx.fillStyle='#1a1a2e'; cx.fillRect(hx+7,hy+12,4,4); cx.fillRect(hx+18,hy+12,4,4);
  cx.fillStyle='#2a1a0a'; cx.fillRect(hx+4,hy+9,8,3); cx.fillRect(hx+15,hy+9,8,3);
  cx.fillStyle='#e07060'; cx.fillRect(hx+9,hy+20,9,2);
  cx.fillStyle='#e8c4a0'; cx.fillRect(x-4,y+26+armOff,7,14); cx.fillRect(x+27,y+26-armOff,7,14);
  cx.globalAlpha=1;
}

function emitFart() {
  for (let i=0;i<3;i++) {
    particles.push({ x:p.x+6+Math.random()*8, y:p.y+50+Math.random()*6,
      vx:-2-Math.random()*3, vy:1+Math.random()*2,
      life:30+Math.random()*20, maxLife:50, r:4+Math.random()*4 });
  }
}

function drawParticles() {
  for (const pt of particles) {
    cx.globalAlpha=(pt.life/pt.maxLife)*0.7;
    cx.fillStyle='#5cb85c'; cx.beginPath(); cx.arc(pt.x,pt.y,pt.r,0,Math.PI*2); cx.fill();
    cx.fillStyle='#8fd88f'; cx.beginPath(); cx.arc(pt.x-1,pt.y-1,pt.r*0.5,0,Math.PI*2); cx.fill();
  }
  cx.globalAlpha=1;
}

function drawSoap(o) {
  cx.fillStyle='#f9f0ff'; cx.beginPath(); cx.roundRect(o.x,o.y,o.w,o.h,6); cx.fill();
  cx.strokeStyle='#a080d0'; cx.lineWidth=1.5; cx.stroke();
  cx.fillStyle='#a080d0'; cx.font='bold 9px monospace'; cx.fillText('SOAP',o.x+3,o.y+o.h/2+4);
  cx.fillStyle='#fff'; cx.beginPath(); cx.ellipse(o.x+8,o.y+6,4,2,-0.3,0,Math.PI*2); cx.fill();
}

function drawSoapCol(o) {
  cx.fillStyle='#f9f0ff'; cx.beginPath(); cx.roundRect(o.x,o.y,o.w,o.h,8); cx.fill();
  cx.strokeStyle='#a080d0'; cx.lineWidth=1.5; cx.stroke();
  cx.fillStyle='#a080d0'; cx.font='bold 9px monospace';
  cx.save(); cx.translate(o.x+o.w/2,o.y+o.h/2); cx.rotate(-Math.PI/2); cx.fillText('SOAP',-10,3); cx.restore();
}

function drawShower(o) {
  cx.fillStyle='#888'; cx.fillRect(o.x+o.w/2-3,o.y,6,8);
  cx.fillStyle='#aaa'; cx.beginPath(); cx.ellipse(o.x+o.w/2,o.y+12,14,6,0,0,Math.PI*2); cx.fill();
  cx.fillStyle='#888';
  for (let i=-2;i<=2;i++) cx.fillRect(o.x+o.w/2+i*4-1,o.y+14,2,2);
  const st=o.y+16, sh=o.h-16;
  cx.fillStyle='rgba(100,180,255,0.55)'; cx.fillRect(o.x+o.w/2-16,st,32,sh);
  cx.fillStyle='rgba(180,220,255,0.7)';
  for (let i=0;i<8;i++) { const dy=(frame*4+i*18)%sh; cx.fillRect(o.x+o.w/2-14+(i%3)*9,st+dy,3,8); }
  if (o.upper) {
    cx.fillStyle='#c0a880'; cx.fillRect(o.x-4,o.y+o.h,o.w+8,6);
    cx.fillStyle='#9a8060'; cx.fillRect(o.x-4,o.y+o.h+6,o.w+8,2);
  }
}

function drawDuck(c) {
  if (c.taken) return;
  const x=c.x, y=c.y;
  cx.fillStyle='#ffd83a';
  cx.beginPath(); cx.ellipse(x+11,y+13,11,8,0,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(x+16,y+7,7,0,Math.PI*2); cx.fill();
  cx.fillStyle='#ff8c1a';
  cx.beginPath(); cx.moveTo(x+21,y+7); cx.lineTo(x+26,y+8); cx.lineTo(x+21,y+10); cx.fill();
  cx.fillStyle='#1a1a2e'; cx.fillRect(x+17,y+5,2,2);
  cx.beginPath(); cx.arc(x+11,y+13,2.5,0,Math.PI*2); cx.fill();
  cx.fillStyle='rgba(26,26,46,0.5)';
  cx.beginPath(); cx.arc(x+11,y+13,1.2,0,Math.PI*2); cx.fill();
}

function drawHUD() {
  // live stats top-left
  cx.fillStyle='rgba(0,0,0,0.5)';
  cx.beginPath(); cx.roundRect(8,8,160,44,6); cx.fill();
  cx.fillStyle='#fff'; cx.font='bold 13px monospace';
  cx.fillText('📏 ' + Math.floor(score/5) + 'm', 16, 26);
  cx.fillText('🦆 ' + ducks, 16, 44);

  // high scores top-right
  cx.fillStyle='rgba(0,0,0,0.5)';
  cx.beginPath(); cx.roundRect(CW-166,8,158,44,6); cx.fill();
  cx.fillStyle='#ffcc00'; cx.font='bold 11px monospace'; cx.textAlign='right';
  cx.fillText('BEST', CW-12, 22);
  cx.fillStyle='#fff'; cx.font='12px monospace';
  cx.fillText('📏 ' + hiDist + 'm', CW-12, 36);
  cx.fillText('🦆 ' + hiDucks, CW-12, 50);
  cx.textAlign='left';

  // fullscreen toggle bottom-right
  cx.fillStyle='rgba(0,0,0,0.5)';
  cx.beginPath(); cx.roundRect(CW-46,CH-34,38,26,6); cx.fill();
  cx.fillStyle='#aaa'; cx.font='15px monospace'; cx.textAlign='center';
  cx.fillText(document.fullscreenElement||document.webkitFullscreenElement ? '⊡' : '⛶', CW-27, CH-16);
  cx.textAlign='left';
}

function drawIdleScreen() {
  cx.fillStyle='rgba(0,0,0,0.62)'; cx.fillRect(0,0,CW,CH);
  cx.textAlign='center';
  cx.fillStyle='#5cb85c'; cx.font='bold 30px monospace';
  cx.fillText('ÓSKAR: FART JOYRIDE', CW/2, CH/2-32);
  cx.fillStyle='#fff'; cx.font='14px monospace';
  cx.fillText('Hold Space / tap & hold to fart-fly', CW/2, CH/2+2);
  cx.fillText('Release to fall  •  Run on the ground', CW/2, CH/2+22);
  cx.fillStyle='#5cb85c'; cx.font='bold 16px monospace';
  cx.fillText('[ CLICK OR SPACE TO START ]', CW/2, CH/2+58);
  cx.textAlign='left';
}

function drawDeathScreen() {
  cx.fillStyle='rgba(0,0,0,0.78)'; cx.fillRect(0,0,CW,CH);
  cx.save();
  cx.translate(Math.sin(frame*0.9)*2.5, 0);

  cx.textAlign='center';
  cx.font='bold 52px monospace';
  cx.fillStyle='#550000'; cx.fillText("YOU'RE CLEAN", CW/2+3, CH/2-50+3);
  cx.fillStyle='#ff1a1a'; cx.fillText("YOU'RE CLEAN", CW/2, CH/2-50);

  const dist = Math.floor(score/5);
  cx.fillStyle='#fff'; cx.font='15px monospace';
  cx.fillText('📏 ' + dist + 'm' + (dist>=hiDist ? '   🏆 NEW BEST!' : '   (best: '+hiDist+'m)'), CW/2, CH/2-6);
  cx.fillText('🦆 ' + ducks + (ducks>=hiDucks ? '   🏆 NEW BEST!' : '   (best: '+hiDucks+')'), CW/2, CH/2+16);

  // restart button
  cx.fillStyle='rgba(92,184,92,0.2)';
  cx.beginPath(); cx.roundRect(CW/2-90,CH/2+36,180,40,8); cx.fill();
  cx.strokeStyle='#5cb85c'; cx.lineWidth=1.5;
  cx.beginPath(); cx.roundRect(CW/2-90,CH/2+36,180,40,8); cx.stroke();
  cx.fillStyle='#5cb85c'; cx.font='bold 16px monospace';
  cx.fillText('▶  PLAY AGAIN', CW/2, CH/2+62);

  cx.restore();
  cx.textAlign='left';
}

// ── UPDATE ────────────────────────────────────────────────────────────────────
function update() {
  if (state!=='running') return;
  frame++; score++;
  speed = 4 + Math.floor(score/400)*0.5;
  if (thrusting) { p.vy+=THRUST+GRAV; emitFart(); p.grounded=false; }
  else p.vy+=GRAV;
  p.vy=Math.max(-MAXV,Math.min(MAXV,p.vy));
  p.y+=p.vy;
  if (p.y<CEIL) { p.y=CEIL; p.vy=0; }
  if (p.y+p.h>=FLOOR) { p.y=FLOOR-p.h; p.vy=0; p.grounded=true; } else p.grounded=false;

  for (let i=particles.length-1;i>=0;i--) {
    const pt=particles[i];
    pt.x+=pt.vx-speed*0.3; pt.y+=pt.vy; pt.life--; pt.r*=1.02;
    if (pt.life<=0) particles.splice(i,1);
  }
  spawnT--;
  if (spawnT<=0) { spawn(); spawnT=55+Math.floor(Math.random()*50); }
  for (let i=obs.length-1;i>=0;i--) { obs[i].x-=speed; if (obs[i].x+obs[i].w<-20) obs.splice(i,1); }
  for (let i=coins.length-1;i>=0;i--) { coins[i].x-=speed; if (coins[i].x+coins[i].w<-20) coins.splice(i,1); }

  const pb={x:p.x,y:p.y,w:p.w,h:p.h};
  for (const o of obs) {
    if (o.t==='soap'||o.t==='soap_col') { if (overlap(pb,o)) { die(); break; } }
    else if (o.t==='shower') {
      const stream={x:o.x+o.w/2-16,y:o.y+16,w:32,h:o.h-16};
      if (o.upper) {
        if (overlap(pb,{x:o.x-4,y:o.y+o.h,w:o.w+8,h:6})||overlap(pb,stream)) { die(); break; }
      } else if (overlap(pb,stream)) { die(); break; }
    }
  }
  for (const c of coins) { if (!c.taken&&overlap(pb,c)) { c.taken=true; ducks++; } }
}

function die() {
  if (state==='dead') return;
  state='dead'; p.dead=true; saveHi();
}

function draw() {
  cx.clearRect(0,0,CW,CH);
  drawBg();
  for (const o of obs) {
    if (o.t==='soap') drawSoap(o);
    else if (o.t==='soap_col') drawSoapCol(o);
    else if (o.t==='shower') drawShower(o);
  }
  for (const c of coins) drawDuck(c);
  drawParticles();
  drawOskar();
  if (state==='running'||state==='dead') drawHUD();
  if (state==='idle') drawIdleScreen();
  if (state==='dead') drawDeathScreen();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

// ── INPUT ─────────────────────────────────────────────────────────────────────
function getCanvasCoords(e) {
  const rect=cv.getBoundingClientRect();
  const scaleX=CW/rect.width, scaleY=CH/rect.height;
  return { mx:(e.clientX-rect.left)*scaleX, my:(e.clientY-rect.top)*scaleY };
}

function startThrust() {
  if (state==='idle') state='running';
  if (state==='running') thrusting=true;
}
function stopThrust() { thrusting=false; }

cv.addEventListener('pointerdown', e => {
  const {mx,my} = getCanvasCoords(e);
  if (mx>CW-46&&my>CH-34) { toggleFullscreen(); return; }
  if (state==='dead'&&mx>CW/2-90&&mx<CW/2+90&&my>CH/2+36&&my<CH/2+76) { init(); state='running'; return; }
  startThrust();
});
cv.addEventListener('pointerup', stopThrust);
cv.addEventListener('pointerleave', stopThrust);

document.addEventListener('keydown', e => {
  if (e.code==='Space'&&!e.repeat) {
    e.preventDefault();
    if (state==='dead') { init(); state='running'; return; }
    startThrust();
  }
  if (e.code==='KeyF'&&!e.repeat) toggleFullscreen();
});
document.addEventListener('keyup', e => { if (e.code==='Space') { e.preventDefault(); stopThrust(); } });

function toggleFullscreen() {
  if (!document.fullscreenElement&&!document.webkitFullscreenElement) {
    if (wrap.requestFullscreen) wrap.requestFullscreen();
    else if (wrap.webkitRequestFullscreen) wrap.webkitRequestFullscreen();
  } else {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  }
}

document.addEventListener('fullscreenchange', resizeCanvas);
document.addEventListener('webkitfullscreenchange', resizeCanvas);

init();
loop();
</script>
</body>
</html>
